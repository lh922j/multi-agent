services:
  postgres:
    image: postgres:17
    container_name: multi_agent_postgres
    environment:
      POSTGRES_DB: realestate
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin1234}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d realestate"]
      interval: 10s
      timeout: 5s
      retries: 5

  # DB 테이블 생성 (최초 or 재배포 시 1회 실행 후 종료)
  init-db:
    build: .
    command: python -c "from src.multi_agent.db.database import init_db; init_db(); print('DB init done')"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://admin:${POSTGRES_PASSWORD:-admin1234}@postgres:5432/realestate
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  fastapi:
    build: .
    container_name: multi_agent_fastapi
    command: uvicorn src.multi_agent.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://admin:${POSTGRES_PASSWORD:-admin1234}@postgres:5432/realestate
      - MODEL_PATH=/app/data/models/price_model_trade_lgbm_complex.pkl
      - RENT_MODEL_PATH=/app/data/models/price_model_rent_lgbm_complex.pkl
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:

# ── 실행 방법 ────────────────────────────────────────────────────
# 최초 실행:  docker compose up -d --build
# 업데이트:   docker compose up -d --build fastapi
# 로그 확인:  docker compose logs -f fastapi
# DB 접속:    docker compose exec postgres psql -U admin -d realestate
#
# EC2 배포 시: .env의 POSTGRES_PASSWORD, OPENAI_API_KEY 등 교체 후 동일하게 실행
#              보안그룹에서 8000(FastAPI) 포트 허용
