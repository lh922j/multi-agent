name: Evaluation CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# OpenAI API 비용 절감 전략
# - PR:   시스템 지표만 실행 (라우팅·지연·map_points) — LLM 비용 없음
# - main push: LLM 품질 평가 추가 실행 (DeepEval)

jobs:
  # ──────────────────────────────────────────────────────────────
  # Tier 1: 시스템 지표 — 모든 PR + main push (저비용)
  # ──────────────────────────────────────────────────────────────
  system-metrics:
    name: System Metrics (Routing / Latency / Map)
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ""
      LANGFUSE_SECRET_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Copy DB fixtures
        run: |
          # CI 환경에서 SQLite DB 파일이 필요한 경우 캐시에서 복원
          # 없으면 빈 DB로 진행 (라우팅 테스트는 DB 불필요)
          mkdir -p data
          if [ -f "${{ runner.temp }}/realestate.db" ]; then
            cp "${{ runner.temp }}/realestate.db" data/
          fi

      - name: Run system metrics tests
        run: |
          pytest tests/eval/test_system_metrics.py \
            -v \
            --tb=short \
            -k "routing or offscope" \
            --timeout=30
        # 라우팅·offscope 거절 테스트만 실행 (LLM 1 hop, DB 불필요)
        # E2E 지연·map_points 테스트는 DB 데이터 필요 → 로컬 또는 self-hosted runner 권장

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-metrics-results-${{ github.sha }}
          path: |
            tests/eval/results/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────
  # Tier 2: LLM 품질 평가 — main push 전용 (DeepEval, 비용 발생)
  # ──────────────────────────────────────────────────────────────
  llm-quality:
    name: LLM Quality (DeepEval)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: system-metrics   # 시스템 지표 통과 후에만 실행

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
      DEEPEVAL_API_KEY: ${{ secrets.DEEPEVAL_API_KEY }}   # Confident AI (선택)
      LANGFUSE_PUBLIC_KEY: ""
      LANGFUSE_SECRET_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (eval extras)
        run: |
          pip install -e ".[dev,eval]"

      - name: Copy DB fixtures
        run: |
          mkdir -p data
          if [ -f "${{ runner.temp }}/realestate.db" ]; then
            cp "${{ runner.temp }}/realestate.db" data/
          fi

      - name: Copy RAG documents
        run: |
          # ChromaDB 재인덱싱 필요 시 실행
          # python scripts/build_rag.py  (선택)
          echo "RAG docs are committed in rag/docs/"

      - name: Run LLM quality tests (DeepEval)
        run: |
          deepeval test run tests/eval/test_llm_quality.py \
            --verbose \
            -k "rag or offscope"
        # 비용 절감: rag + offscope 케이스만 실행
        # 전체 실행 시 -k 옵션 제거

      - name: Upload DeepEval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-quality-results-${{ github.sha }}
          path: |
            tests/eval/results/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # (선택) 회귀 방지 — 라우팅 정확도 100% 보장
  # ──────────────────────────────────────────────────────────────
  routing-gate:
    name: Routing Gate (100% accuracy required)
    runs-on: ubuntu-latest
    needs: system-metrics

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      KAKAO_API_KEY: ""
      LANGFUSE_PUBLIC_KEY: ""
      LANGFUSE_SECRET_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Assert routing accuracy = 100%
        run: |
          pytest tests/eval/test_system_metrics.py::test_routing_accuracy \
            -v \
            --tb=long \
            --timeout=30
